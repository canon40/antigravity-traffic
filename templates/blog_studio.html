<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canon4040 블로그 스튜디오</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel: rgba(30, 41, 59, 0.85);
            --border: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --sub: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 16px 40px; }
        .wrap { max-width: 960px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.55rem; background: linear-gradient(90deg,#a78bfa,#34d399); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        header p { color: var(--sub); font-size: 0.82rem; margin-top: 6px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .panel h2 { font-size: 0.95rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.75rem; color: var(--sub); margin-bottom: 6px; }
        .field input, .field textarea, .field select {
            width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15,23,42,0.8); color: var(--text); font-size: 0.88rem;
        }
        .field textarea { min-height: 72px; resize: vertical; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 640px) { .row2 { grid-template-columns: 1fr; } }
        .checks { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.85rem; margin: 10px 0; }
        .checks label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .product-row { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; margin: 8px 0; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
        .btn {
            border: none; border-radius: 12px; padding: 14px 16px; font-weight: 700; font-size: 0.92rem;
            cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-draft { background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .btn-run { background: linear-gradient(135deg, #2563eb, #3b82f6); }
        .btn-save { background: linear-gradient(135deg, #475569, #64748b); width: 100%; margin-top: 8px; }
        .hint { font-size: 0.75rem; color: var(--sub); margin-top: 8px; line-height: 1.45; }
        .status-box, .log { font-size: 0.8rem; color: var(--sub); white-space: pre-wrap; line-height: 1.5; }
        .log { background: #090d16; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 0.75rem; color: #38bdf8; max-height: 220px; overflow-y: auto; }
        .preview { background: rgba(15,23,42,0.9); border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; padding: 16px; min-height: 80px; font-size: 0.88rem; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.72rem; background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .badge.busy { background: rgba(245,158,11,0.15); color: #fbbf24; border-color: rgba(245,158,11,0.3); }
        .badge.quality-good { background: rgba(56,189,248,0.15); color: #38bdf8; border-color: rgba(56,189,248,0.3); }
        .badge.quality-warn { background: rgba(245,158,11,0.15); color: #fbbf24; border-color: rgba(245,158,11,0.3); }
        .badge.quality-poor { background: rgba(249,115,22,0.15); color: #fb923c; border-color: rgba(249,115,22,0.3); }
        .quality-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .quality-details { font-size: 0.74rem; color: var(--sub); }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1><i class="fa-solid fa-pen-nib"></i> canon4040 블로그 스튜디오</h1>
        <p>Autoblog GUI(첨부2)와 동일 엔진 · 글쓰기+이미지+네이버·티스토리 발행</p>
        <p style="margin-top:6px;"><span id="healthBadge" class="badge">연결 확인 중…</span></p>
    </header>

    <div class="panel">
        <h2><i class="fa-solid fa-robot"></i> 자동화 (GUI와 동일)</h2>
        <div class="field">
            <label>포스팅 키워드 (쉼표 또는 줄바꿈)</label>
            <textarea id="keywords" rows="4" placeholder="듀라코트 리빙코트, 욕실코팅제…"></textarea>
        </div>
        <div class="row2">
            <div class="field">
                <label>글 유형</label>
                <select id="postType"></select>
            </div>
            <div class="field">
                <label>발행 개수 / 간격(분)</label>
                <div class="row2" style="gap:8px;">
                    <input id="count" type="number" min="1" value="1">
                    <input id="gap" type="number" min="1" value="1">
                </div>
            </div>
        </div>
        <div class="field">
            <label>발행 대상</label>
            <div class="checks">
                <label><input type="checkbox" id="useNaver1" checked> 네이버1 (hymini1)</label>
                <label><input type="checkbox" id="useNaver2" checked> 네이버2 (hymini11)</label>
                <label><input type="checkbox" id="useTistory" checked> 티스토리</label>
                <label><input type="checkbox" id="useGoogle"> 구글(Blogger)</label>
            </div>
        </div>
        <div class="field">
            <label>네이버 최적화</label>
            <div class="checks">
                <label><input type="checkbox" id="enableIntentPlanner" checked> 검색 의도 자동 분석</label>
                <label><input type="checkbox" id="enableQualityGuard" checked> 발행 전 품질 검사</label>
            </div>
        </div>
        <div class="field">
            <label>홍보 상품</label>
            <div class="product-row" id="productRow"></div>
            <input id="productUrl" type="text" placeholder="스마트스토어 URL" style="margin-top:8px;">
        </div>
        <div class="row2">
            <div class="field">
                <label>글 생성 엔진</label>
                <select id="textProvider">
                    <option value="로컬 Ollama (무료)">로컬 Ollama (무료)</option>
                    <option value="Gemini API (유료)">Gemini API (유료)</option>
                    <option value="클로드 코드 (Claude Code)">클로드 코드 (Claude Code)</option>
                    <option value="자동 (Ollama → Gemini)">자동 (Ollama → Gemini)</option>
                </select>
            </div>
            <div class="field">
                <label>AI 이미지 엔진</label>
                <select id="imageProvider">
                    <option value="Gen AI (Gemini 이미지)">Gen AI (Gemini 이미지)</option>
                    <option value="자동 (Gen AI → Vertex → 무료)">자동 (Gen AI → Vertex → 무료)</option>
                    <option value="로컬 무료 (Pollinations)">로컬 무료 (Pollinations)</option>
                    <option value="Pillow 플레이스홀더 (테스트용)">Pillow 플레이스홀더 (테스트용)</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn btn-save" onclick="saveSettings()"><i class="fa-solid fa-floppy-disk"></i> 설정 저장 (accounts.json)</button>
        <div class="btn-row">
            <button type="button" class="btn btn-draft" id="draftBtn" onclick="runDraft()"><i class="fa-solid fa-file-pen"></i> 원고+이미지 생성</button>
            <button type="button" class="btn btn-run" id="runBtn" onclick="runAutomation()"><i class="fa-solid fa-rocket"></i> 자동화 시작</button>
        </div>
        <div class="quality-row">
            <span id="qualityBadge" class="badge">품질 대기</span>
            <span id="qualityHint" class="hint" style="margin-top:0;">품질 점수: 아직 없음</span>
        </div>
        <p class="quality-details" id="qualityDetails">세부 항목: 아직 없음</p>
        <p class="hint">원고+이미지: drafts/ 저장만 · 자동화 시작: 네이버·티스토리 실제 발행 (Playwright). GUI와 동일합니다.</p>
    </div>

    <div class="panel">
        <h2><i class="fa-solid fa-circle-info"></i> 시스템 안내</h2>
        <div id="statusBox" class="status-box">로딩 중…</div>
    </div>

    <div class="panel">
        <h2><i class="fa-solid fa-terminal"></i> 로그</h2>
        <div id="logBox" class="log"></div>
    </div>
</div>
<script>
    let settings = {};

    function parseKeywords(text) {
        return text.split(/[,，\n;]+/).map(s => s.trim()).filter(Boolean);
    }

    function collectPayload() {
        const kws = parseKeywords(document.getElementById('keywords').value);
        return {
            keywords: kws,
            keywords_text: kws.join('\n'),
            post_type: document.getElementById('postType').value,
            count: parseInt(document.getElementById('count').value, 10) || 1,
            gap: parseInt(document.getElementById('gap').value, 10) || 1,
            use_naver1: document.getElementById('useNaver1').checked,
            use_naver2: document.getElementById('useNaver2').checked,
            use_tistory: document.getElementById('useTistory').checked,
            use_google: document.getElementById('useGoogle').checked,
            enable_intent_planner: document.getElementById('enableIntentPlanner').checked,
            enable_quality_guard: document.getElementById('enableQualityGuard').checked,
            product_choice: document.querySelector('input[name=product]:checked')?.value || 'living',
            product_url: document.getElementById('productUrl').value.trim(),
            text_provider: document.getElementById('textProvider').value,
            image_provider: document.getElementById('imageProvider').value,
            keyword: kws[0] || '',
        };
    }

    function fillProductRow(labels) {
        const row = document.getElementById('productRow');
        const cur = settings.product_choice || 'living';
        row.innerHTML = Object.entries(labels || {}).map(([k, label]) =>
            `<label><input type="radio" name="product" value="${k}" ${k === cur ? 'checked' : ''}> ${label}</label>`
        ).join('');
    }

    function applySettings(d) {
        settings = d;
        if (d.keywords_text) document.getElementById('keywords').value = d.keywords_text;
        const sel = document.getElementById('postType');
        sel.innerHTML = (d.post_types || ['제품 홍보']).map(t =>
            `<option value="${t}" ${t === d.post_type ? 'selected' : ''}>${t}</option>`
        ).join('');
        document.getElementById('count').value = d.count || 1;
        document.getElementById('gap').value = d.gap || 1;
        document.getElementById('useNaver1').checked = !!d.use_naver1;
        document.getElementById('useNaver2').checked = !!d.use_naver2;
        document.getElementById('useTistory').checked = !!d.use_tistory;
        document.getElementById('useGoogle').checked = !!d.use_google;
        document.getElementById('enableIntentPlanner').checked = d.enable_intent_planner !== false;
        document.getElementById('enableQualityGuard').checked = d.enable_quality_guard !== false;
        document.getElementById('productUrl').value = d.product_url || '';
        fillProductRow(d.product_labels);
        if (d.text_provider) document.getElementById('textProvider').value = d.text_provider;
        if (d.image_provider) document.getElementById('imageProvider').value = d.image_provider;
    }

    async function loadSettings() {
        try {
            const r = await fetch('/api/blog/settings');
            const d = await r.json();
            if (d.ok !== false) applySettings(d);
        } catch (e) { console.warn(e); }
    }

    async function saveSettings() {
        const payload = collectPayload();
        try {
            const r = await fetch('/api/blog/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const d = await r.json();
            if (!d.ok) throw new Error(d.error || '저장 실패');
            applySettings(d);
            alert('설정이 accounts.json에 저장되었습니다.');
        } catch (e) {
            alert('저장 실패: ' + e);
        }
    }

    async function refreshHealth() {
        const badge = document.getElementById('healthBadge');
        try {
            const r = await fetch('/api/javis/health');
            const d = await r.json();
            if (d.job_running) {
                badge.className = 'badge busy';
                badge.textContent = '작업 실행 중…';
            } else {
                badge.className = 'badge';
                badge.textContent = 'login2 Autoblog 엔진 · :' + (d.port || '8790');
            }
        } catch (_) {
            badge.className = 'badge busy';
            badge.textContent = '서버 연결 실패';
        }
    }

    async function loadStatus() {
        try {
            const r = await fetch('/api/blog/status');
            const d = await r.json();
            document.getElementById('statusBox').textContent = d.text || d.error || '—';
            const quality = d.quality_report?.after;
            const badge = document.getElementById('qualityBadge');
            const hint = document.getElementById('qualityHint');
            const details = document.getElementById('qualityDetails');
            if (quality && typeof quality.score === 'number') {
                const score = quality.score ?? 0;
                const level = score >= 90 ? 'excellent' : score >= 75 ? 'good' : score >= 60 ? 'warn' : 'poor';
                badge.className = `badge ${level === 'excellent' ? '' : 'quality-' + level}`.trim();
                badge.textContent = level === 'excellent' ? '품질 우수' : level === 'good' ? '품질 양호' : level === 'warn' ? '품질 주의' : '품질 보완 필요';
                hint.textContent = `품질 점수: ${score}점 · 의도: ${quality.intent_type || '-'}`;
                details.textContent = `세부 항목: 긴 문단 ${quality.long_paragraphs ?? 0}개 · 요약 ${quality.has_summary ? '있음' : '없음'} · 표 ${quality.has_table ? '있음' : '없음'} · FAQ ${quality.has_faq ? '있음' : '없음'} · 목록 ${quality.has_list ? '있음' : '없음'}`;
            } else {
                badge.className = 'badge';
                badge.textContent = '품질 대기';
                hint.textContent = '품질 점수: 아직 없음';
                details.textContent = '세부 항목: 아직 없음';
            }
        } catch (e) {
            document.getElementById('statusBox').textContent = String(e);
        }
    }

    async function pollLogs() {
        try {
            const r = await fetch('/api/blog/logs');
            const d = await r.json();
            const box = document.getElementById('logBox');
            box.textContent = (d.logs || []).join('\n');
            box.scrollTop = box.scrollHeight;
        } catch (_) {}
    }

    function setBusy(busy) {
        document.getElementById('runBtn').disabled = busy;
        document.getElementById('draftBtn').disabled = busy;
    }

    async function waitJobDone(maxMs = 600000) {
        const started = Date.now();
        while (Date.now() - started < maxMs) {
            await new Promise(r => setTimeout(r, 2500));
            await pollLogs();
            await loadStatus();
            try {
                const r = await fetch('/api/javis/health');
                const d = await r.json();
                if (!d.job_running) {
                    const last = await fetch('/api/blog/last');
                    const rep = await last.json();
                    const err = rep.report?.error;
                    if (err) return { ok: false, error: err };
                    return { ok: rep.report?.ok !== false };
                }
            } catch (_) {}
        }
        return { ok: false, error: '작업 시간 초과 — 로그를 확인하세요.' };
    }

    async function postRun(url, payload) {
        const kws = payload.keywords || [];
        if (!kws.length) { alert('키워드를 입력하세요.'); return; }
        setBusy(true);
        try {
            const r = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...payload, keywords: kws.length > 1 ? kws : undefined }),
            });
            const d = await r.json();
            if (d.busy) {
                alert('이미 작업 중입니다. 로그를 확인하세요.');
            } else if (!d.ok && !d.async) {
                alert(d.error || '실패');
            } else if (d.async) {
                alert((d.message || '시작됨') + '\n\n완료까지 1~3분 걸릴 수 있습니다. 아래 로그를 확인하세요.');
                const done = await waitJobDone();
                if (!done.ok) alert('작업 실패: ' + (done.error || '로그 확인'));
                else alert(url.includes('draft') ? '원고+이미지 생성이 완료되었습니다. drafts/ 폴더를 확인하세요.' : '자동화 작업이 완료되었습니다.');
            } else {
                alert(d.message || '완료');
            }
        } catch (e) {
            alert('요청 실패: ' + e);
        } finally {
            setBusy(false);
            refreshHealth();
            pollLogs();
            loadStatus();
        }
    }

    async function runDraft() {
        await saveSettings();
        await postRun('/api/blog/draft', collectPayload());
    }

    async function runAutomation() {
        await saveSettings();
        await postRun('/api/blog/run', collectPayload());
    }

    loadSettings();
    loadStatus();
    refreshHealth();
    pollLogs();
    setInterval(pollLogs, 3000);
    setInterval(refreshHealth, 5000);
    setInterval(loadStatus, 5000);
</script>
</body>
</html>
