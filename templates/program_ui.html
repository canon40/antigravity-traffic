<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ program_name }} · 독립 UI</title>
  <style>
    :root {
      --bg: #0a0f1d;
      --panel: #111a2f;
      --line: #253457;
      --text: #edf2ff;
      --sub: #a9b7d6;
      --accent: #6ea2ff;
      --ok: #75d8a5;
      --warn: #efbc79;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(900px 700px at 10% -15%, #1a2a4a 0%, var(--bg) 70%);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .shell {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(18,30,52,.96), rgba(12,20,35,.96));
      padding: 20px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 24px; line-height: 1.2; }
    .id { color: var(--sub); font-size: 12px; margin-top: 6px; word-break: break-all; }
    .nav { display: flex; gap: 8px; }
    .btn {
      border: 1px solid var(--line);
      background: #0f182b;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: linear-gradient(135deg, #2d61cc, #4d7df0); border-color: #3a6fe2; }
    .panel {
      border: 1px solid var(--line);
      background: rgba(12,20,35,.6);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .meta .cell { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.01); }
    .meta .k { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
    .meta .v { font-size: 13px; }
    .desc { color: #d6e0f8; line-height: 1.5; font-size: 14px; margin: 0; }
    .status { font-size: 13px; color: var(--sub); margin-top: 8px; min-height: 20px; }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    #logs {
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      background: #060b16;
      border: 1px solid #1f2e4d;
      border-radius: 10px;
      padding: 10px;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #9bc1ff;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div>
        <h1 id="title">{{ program_name }}</h1>
        <div class="id" id="programId">{{ program_id }}</div>
      </div>
      <div class="nav">
        <a class="btn" href="/programs">목록</a>
        <a class="btn" href="/">통합 허브</a>
      </div>
    </div>

    <section class="panel">
      <p id="description" class="desc">로딩 중...</p>
      <div class="meta" style="margin-top: 10px;">
        <div class="cell"><div class="k">워크스페이스</div><div class="v" id="workspace">-</div></div>
        <div class="cell"><div class="k">카테고리</div><div class="v" id="category">-</div></div>
        <div class="cell"><div class="k">런처</div><div class="v" id="launcher">-</div></div>
        <div class="cell"><div class="k">런타임</div><div class="v" id="runtime">-</div></div>
      </div>
      <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn primary" onclick="launchProgram()">이 프로그램 실행</button>
        <button class="btn" onclick="refreshProgram()">정보 새로고침</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <div style="font-size: 13px; color: var(--sub); margin-bottom: 8px;">실행 로그</div>
      <pre id="logs">(대기 중)</pre>
    </section>
  </main>

  <script>
    const programId = {{ program_id|tojson }};

    function setStatus(msg, kind) {
      const el = document.getElementById("status");
      el.textContent = msg || "";
      el.className = "status" + (kind ? " " + kind : "");
    }

    function appendLog(line) {
      const el = document.getElementById("logs");
      if (el.textContent === "(대기 중)") el.textContent = "";
      el.textContent += (el.textContent ? "\n" : "") + line;
      el.scrollTop = el.scrollHeight;
    }

    function bindProgram(program) {
      document.getElementById("title").textContent = program.name || programId;
      document.getElementById("description").textContent = program.description || "설명이 없습니다.";
      document.getElementById("workspace").textContent = program.workspace || "-";
      document.getElementById("category").textContent = program.category || "-";
      document.getElementById("launcher").textContent = program.launcher || "-";
      document.getElementById("runtime").textContent = program.runtime || "-";
    }

    async function refreshProgram() {
      setStatus("프로그램 정보 조회 중...", "");
      try {
        const res = await fetch(`/api/program/${encodeURIComponent(programId)}`);
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || "조회 실패");
        bindProgram(data.program || {});
        setStatus("프로그램 정보를 갱신했습니다.", "ok");
      } catch (err) {
        setStatus(`조회 실패: ${err}`, "warn");
      }
    }

    async function launchProgram() {
      setStatus("실행 요청 중...", "");
      try {
        const res = await fetch("/api/javis/launch", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({id: programId})
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          appendLog(`[실패] ${data.error || "실행 실패"}`);
          setStatus(data.error || "실행 실패", "warn");
          return;
        }
        appendLog(`[성공] ${data.message || "실행 요청 완료"}`);
        if (Array.isArray(data.logs)) {
          data.logs.forEach(line => appendLog(String(line)));
        }
        setStatus(data.message || "실행 완료", "ok");
      } catch (err) {
        setStatus(`요청 실패: ${err}`, "warn");
      }
    }

    refreshProgram();
  </script>
</body>
</html>
