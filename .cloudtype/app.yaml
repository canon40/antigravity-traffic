name: antigravity-traffic
options:
  env:
    - name: CLOUDTYPE
      value: "1"
    - name: HUB_CLOUD_PLATFORM
      value: cloudtype
    - name: AUTO_START_SCHEDULER
      value: "1"
    - name: FLASK_ENV
      value: production
    - name: PORT
      value: "8000"
  ports: 8000
  install: pip install -r requirements-cloudtype.txt
  start: gunicorn app:app -b 0.0.0.0:${PORT:-8000} --timeout 120 --workers 1 --access-logfile -
context:
  git:
    url: https://github.com/canon40/antigravity-traffic.git
    branch: main
  preset: python-flask
